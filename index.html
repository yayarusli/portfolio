<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Gallery</title>
  <style>
    /* Reset margins and hidden overflow for full screen */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #000; /* Dark background looks better for full-screen images */
      overflow: hidden; /* Prevent scrolling */
    }

    /* Container for the image */
    .slider-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #slide {
      width: 100%;
      height: 100%;
      object-fit: contain; /* Keeps the whole image visible without cropping */
      transition: opacity 0.5s ease-in-out;
    }

    /* Arrow Styling */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      font-size: 2rem;
      padding: 20px;
      cursor: pointer;
      border-radius: 50%;
      transition: background 0.3s;
      z-index: 10;
      user-select: none;
    }

    .arrow:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    .prev { left: 20px; }
    .next { right: 20px; }

    /* Small counter at the bottom */
    .counter {
      position: absolute;
      bottom: 20px;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="slider-container">
    <button class="arrow prev" onclick="prev()">&#10094;</button>
    
    <img id="slide" src="image1.jpg" alt="Portfolio Image">
    
    <button class="arrow next" onclick="next()">&#10095;</button>

    <div class="counter" id="page-num">1 / 3</div>
  </div>

  <script>
    const images = [
      "mal.jpeg",
      "mal2.jpeg",
      "mal3.jpeg"
    ];

    let index = 0;
    const slideImg = document.getElementById("slide");
    const counter = document.getElementById("page-num");

    function updateGallery() {
      // Add a quick fade effect
      slideImg.style.opacity = 0;
      
      setTimeout(() => {
        slideImg.src = images[index];
        slideImg.style.opacity = 1;
        counter.innerText = (index + 1) + " / " + images.length;
      }, 200);
    }

    function next() {
      index = (index + 1) % images.length;
      updateGallery();
    }

    function prev() {
      index = (index - 1 + images.length) % images.length;
      updateGallery();
    }

    // Keyboard navigation (optional)
    document.addEventListener('keydown', (e) => {
      if (e.key === "ArrowRight") next();
      if (e.key === "ArrowLeft") prev();
    });
  </script>

</body>
</html>
