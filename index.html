<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    /* Hilangkan margin asal browser */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      /* Aktifkan efek 'snap' bila scroll */
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      background-color: #111; /* Background gelap supaya gambar nampak naik */
    }

    /* Setiap section akan jadi full screen */
    section {
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      scroll-snap-align: start; /* Bahagian yang akan 'lekat' */
      position: relative;
    }

    img {
      width: 100%;
      height: 100%;
      /* Penting: Supaya gambar tak penyek, dia akan penuhkan screen */
      object-fit: cover; 
    }

    /* Arrow hint kat bawah (optional) */
    .scroll-hint {
      position: absolute;
      bottom: 20px;
      color: white;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.6;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
      40% {transform: translateY(-10px);}
      60% {transform: translateY(-5px);}
    }
  </style>
</head>
<body>

  <section>
    <img src="mal.jpeg" alt="Work 1">
    <div class="scroll-hint">Scroll Down ↓</div>
  </section>

  <section>
    <img src="mal2.jpeg" alt="Work 2">
  </section>

  <section>
    <img src="mal3.jpeg" alt="Work 3">
  </section>

</body>
</html>
