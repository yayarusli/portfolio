<!DOCTYPE html>
<html>
<head>
  <title>My Portfolio</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      margin-top: 30px;
    }

    .slider {
      margin-top: 30px;
    }

    img {
      width: 60%;
      max-width: 600px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    button {
      margin: 20px;
      padding: 10px 20px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: gray;
    }
  </style>
</head>

<body>

  <h1>My Portfolio 🎨</h1>

  <div class="slider">
    <img id="slide" src="image1.jpg">
  </div>

  <div>
    <button onclick="prev()">Previous</button>
    <button onclick="next()">Next</button>
  </div>

  <script>
    let images = [
      "mal.jpeg",
      "mal2.jpeg",
      "mal3.jpeg"
    ];

    let index = 0;

    function showImage() {
      document.getElementById("slide").src = images[index];
    }

    function next() {
      index++;
      if (index >= images.length) {
        index = 0;
      }
      showImage();
    }

    function prev() {
      index--;
      if (index < 0) {
        index = images.length - 1;
      }
      showImage();
    }
  </script>

</body>
</html>
