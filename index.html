<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    /* Hilangkan margin asal browser */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      /* Aktifkan efek 'snap' bila scroll */
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      background-color: #111; /* Background gelap supaya gambar nampak naik */
    }

    /* Setiap section akan jadi full screen */
    section {
      height: 100vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    img {
      width: 100%;
      height: 100%;
      /* Penting: Supaya gambar tak penyek, dia akan penuhkan screen */
      object-fit: cover; 
    }

  </style>
</head>
<body>

  <section>
    <img src="mal.jpeg" alt="Work 1">
  </section>

  <section>
    <img src="mal2.jpeg" alt="Work 2">
  </section>

  <section>
    <img src="mal3.jpeg" alt="Work 3">
  </section>

</body>
</html>
